<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业AI大屏 Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #1a1f2e 50%, #0d1117 100%);
            min-height: 100vh;
            color: #ffffff;
        }

        .dashboard {
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00d4ff, #7c3aed, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.2);
        }

        .stat-card .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
        }

        .stat-card .change {
            font-size: 0.875rem;
            margin-top: 8px;
        }

        .stat-card .change.positive {
            color: #10b981;
        }

        .stat-card .change.negative {
            color: #ef4444;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-card.full-width {
            grid-column: span 2;
        }

        .chart-title {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title .icon {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chart-container {
            width: 100%;
            height: 350px;
        }

        .chart-container.large {
            height: 400px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.875rem;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #10b981;
        }

        .live-indicator::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 1200px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .chart-card.full-width {
                grid-column: span 1;
            }
        }

        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <div class="header">
            <h1>🤖 企业 AI Agent Dashboard</h1>
            <p class="subtitle">
                实时监控 AI Agent 性能与业务价值 
                <span class="live-indicator">实时数据</span>
            </p>
        </div>

        <!-- KPI Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">总任务完成数</div>
                <div class="value" id="totalTasks">12,847</div>
                <div class="change positive">↑ 23.5% 较上月</div>
            </div>
            <div class="stat-card">
                <div class="label">平均响应时间</div>
                <div class="value" id="avgResponse">1.2s</div>
                <div class="change positive">↓ 18.2% 较上月</div>
            </div>
            <div class="stat-card">
                <div class="label">自主完成率</div>
                <div class="value" id="successRate">94.7%</div>
                <div class="change positive">↑ 5.3% 较上月</div>
            </div>
            <div class="stat-card">
                <div class="label">ROI 累计</div>
                <div class="value" id="totalROI">$2.4M</div>
                <div class="change positive">↑ 31.8% 较上月</div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <!-- Chart 1: Productivity Trend -->
            <div class="chart-card full-width">
                <div class="chart-title">
                    <span class="icon"></span>
                    生产力提升趋势 (过去30天)
                </div>
                <div id="productivityChart" class="chart-container large"></div>
            </div>

            <!-- Chart 2: Task Status Pie -->
            <div class="chart-card">
                <div class="chart-title">
                    <span class="icon"></span>
                    Agent 任务状态分布
                </div>
                <div id="taskStatusChart" class="chart-container"></div>
            </div>

            <!-- Chart 3: Department Heatmap -->
            <div class="chart-card">
                <div class="chart-title">
                    <span class="icon"></span>
                    部门 AI 采用率热力图
                </div>
                <div id="heatmapChart" class="chart-container"></div>
            </div>

            <!-- Chart 4: ROI Bar Chart -->
            <div class="chart-card full-width">
                <div class="chart-title">
                    <span class="icon"></span>
                    Top AI 用例 ROI 排名
                </div>
                <div id="roiChart" class="chart-container"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>数据更新时间: <span id="updateTime"></span> | 数据来源: Enterprise AI Platform</p>
        </div>
    </div>

    <script>
        // Plotly 全局配置
        const plotlyConfig = {
            displayModeBar: false,
            responsive: true
        };

        // 通用布局设置
        const commonLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            font: {
                family: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif',
                color: 'rgba(255,255,255,0.8)'
            },
            margin: { t: 30, r: 30, b: 50, l: 60 }
        };

        // 生成过去30天的日期
        function generateDates(days) {
            const dates = [];
            const today = new Date();
            for (let i = days - 1; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                dates.push(date.toISOString().split('T')[0]);
            }
            return dates;
        }

        // 生成模拟数据
        function generateProductivityData() {
            const dates = generateDates(30);
            const baseline = 100;
            const data = [];
            
            for (let i = 0; i < 30; i++) {
                const trend = i * 0.8;
                const noise = (Math.random() - 0.5) * 10;
                const weeklyPattern = Math.sin(i / 7 * Math.PI * 2) * 3;
                data.push(baseline + trend + noise + weeklyPattern);
            }
            
            return { dates, data };
        }

        // 1. 生产力提升趋势线图
        function createProductivityChart() {
            const { dates, data } = generateProductivityData();
            
            const trace1 = {
                x: dates,
                y: data,
                type: 'scatter',
                mode: 'lines+markers',
                name: 'AI Agent 效率指数',
                line: {
                    color: '#00d4ff',
                    width: 3,
                    shape: 'spline'
                },
                marker: {
                    size: 6,
                    color: '#00d4ff'
                },
                fill: 'tozeroy',
                fillcolor: 'rgba(0, 212, 255, 0.1)'
            };

            const trace2 = {
                x: dates,
                y: data.map((v, i) => v - 15 + Math.random() * 5),
                type: 'scatter',
                mode: 'lines',
                name: '传统方式基准',
                line: {
                    color: 'rgba(255,255,255,0.3)',
                    width: 2,
                    dash: 'dash'
                }
            };

            const layout = {
                ...commonLayout,
                xaxis: {
                    gridcolor: 'rgba(255,255,255,0.1)',
                    tickformat: '%m/%d',
                    dtick: 5 * 24 * 60 * 60 * 1000
                },
                yaxis: {
                    title: '效率指数',
                    gridcolor: 'rgba(255,255,255,0.1)',
                    zeroline: false
                },
                legend: {
                    x: 0.02,
                    y: 0.98,
                    bgcolor: 'rgba(0,0,0,0.3)',
                    font: { color: '#fff' }
                },
                hovermode: 'x unified'
            };

            Plotly.newPlot('productivityChart', [trace1, trace2], layout, plotlyConfig);
        }

        // 2. Agent 任务状态饼图
        function createTaskStatusChart() {
            const data = [{
                values: [78, 15, 7],
                labels: ['自主完成', 'Escalation (人工介入)', '失败'],
                type: 'pie',
                hole: 0.6,
                marker: {
                    colors: ['#10b981', '#f59e0b', '#ef4444'],
                    line: {
                        color: 'rgba(0,0,0,0.3)',
                        width: 2
                    }
                },
                textinfo: 'label+percent',
                textposition: 'outside',
                textfont: {
                    color: '#fff',
                    size: 12
                },
                hovertemplate: '<b>%{label}</b><br>占比: %{percent}<br>数量: %{value}%<extra></extra>'
            }];

            const layout = {
                ...commonLayout,
                showlegend: false,
                annotations: [{
                    text: '<b>12,847</b><br>总任务',
                    showarrow: false,
                    font: {
                        size: 18,
                        color: '#00d4ff'
                    },
                    x: 0.5,
                    y: 0.5
                }]
            };

            Plotly.newPlot('taskStatusChart', data, layout, plotlyConfig);
        }

        // 3. 部门采用率热力图
        function createHeatmapChart() {
            const departments = ['客服部', '销售部', '研发部', '市场部', '财务部', 'HR部', '运营部', '法务部'];
            const months = ['1月', '2月', '3月', '4月', '5月', '6月'];
            
            // 生成采用率数据 (0-100%)
            const z = departments.map((dept, i) => {
                return months.map((month, j) => {
                    const base = 30 + i * 5;
                    const growth = j * 8;
                    const noise = Math.random() * 10;
                    return Math.min(98, base + growth + noise);
                });
            });

            const data = [{
                z: z,
                x: months,
                y: departments,
                type: 'heatmap',
                colorscale: [
                    [0, '#1e293b'],
                    [0.3, '#0e7490'],
                    [0.6, '#0891b2'],
                    [0.8, '#22d3ee'],
                    [1, '#67e8f9']
                ],
                hovertemplate: '<b>%{y}</b><br>%{x}<br>采用率: %{z:.1f}%<extra></extra>',
                colorbar: {
                    title: {
                        text: '采用率 %',
                        font: { color: '#fff' }
                    },
                    tickfont: { color: '#fff' },
                    ticksuffix: '%'
                }
            }];

            const layout = {
                ...commonLayout,
                xaxis: {
                    side: 'bottom'
                },
                yaxis: {
                    autorange: 'reversed'
                }
            };

            Plotly.newPlot('heatmapChart', data, layout, plotlyConfig);
        }

        // 4. Top 用例 ROI 条形图
        function createROIChart() {
            const useCases = [
                '智能客服 - 自动回复',
                '文档自动化处理',
                '销售线索评分',
                '代码审查助手',
                '会议纪要生成',
                '数据分析报告',
                '邮件智能分类',
                '合规检查自动化'
            ];
            
            const roi = [450000, 380000, 320000, 290000, 250000, 220000, 180000, 150000];
            const efficiency = [92, 88, 85, 91, 87, 83, 79, 94];

            const data = [{
                y: useCases,
                x: roi,
                type: 'bar',
                orientation: 'h',
                marker: {
                    color: roi.map((v, i) => {
                        const intensity = v / Math.max(...roi);
                        return `rgba(0, 212, 255, ${0.4 + intensity * 0.6})`;
                    }),
                    line: {
                        color: '#00d4ff',
                        width: 1
                    }
                },
                text: roi.map(v => `$${(v/1000).toFixed(0)}K`),
                textposition: 'outside',
                textfont: {
                    color: '#00d4ff'
                },
                hovertemplate: '<b>%{y}</b><br>ROI: $%{x:,.0f}<br>效率: %{customdata}%<extra></extra>',
                customdata: efficiency
            }];

            const layout = {
                ...commonLayout,
                xaxis: {
                    title: 'ROI (USD)',
                    gridcolor: 'rgba(255,255,255,0.1)',
                    tickformat: '$,.0f'
                },
                yaxis: {
                    automargin: true
                },
                margin: { t: 20, r: 80, b: 50, l: 180 }
            };

            Plotly.newPlot('roiChart', data, layout, plotlyConfig);
        }

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('updateTime').textContent = timeStr;
        }

        // 实时更新数据
        function updateDashboard() {
            // 更新KPI数字（模拟实时数据）
            const totalTasks = 12847 + Math.floor(Math.random() * 10);
            document.getElementById('totalTasks').textContent = totalTasks.toLocaleString();
            
            updateTime();
        }

        // 初始化 Dashboard
        function initDashboard() {
            createProductivityChart();
            createTaskStatusChart();
            createHeatmapChart();
            createROIChart();
            updateTime();
            
            // 每5秒更新一次数据
            setInterval(updateDashboard, 5000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initDashboard);
        
        // 窗口大小变化时重新调整图表
        window.addEventListener('resize', () => {
            Plotly.Plots.resize('productivityChart');
            Plotly.Plots.resize('taskStatusChart');
            Plotly.Plots.resize('heatmapChart');
            Plotly.Plots.resize('roiChart');
        });
    </script>
</body>
</html>
